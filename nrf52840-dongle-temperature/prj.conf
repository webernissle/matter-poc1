# prj.conf – Kconfig options for nRF52840 Dongle Matter Temperature Sensor
# nRF Connect SDK v2.6 + Matter over Thread
#
# The nRF52840 Dongle connects via OpenThread to the HomePod mini
# which acts as a Thread Border Router (Apple's Thread Border Router is
# built into HomePod mini 2nd gen and later, and HomePod mini with
# software version 16.3 or later).

# ---------------------------------------------------------------------------
# Zephyr kernel
# ---------------------------------------------------------------------------
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2560
CONFIG_MAIN_STACK_SIZE=4096

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_DEFAULT_LEVEL=3   # 3 = Info
CONFIG_MATTER_LOG_LEVEL_INF=y

# ---------------------------------------------------------------------------
# Matter (CHIP) core
# ---------------------------------------------------------------------------
CONFIG_CHIP=y
CONFIG_CHIP_PROJECT_CONFIG="src/CHIPProjectConfig.h"

# Device identification (shown in Apple Home)
CONFIG_CHIP_DEVICE_VENDOR_ID=0xFFF1        # Test VID (use real VID for production)
CONFIG_CHIP_DEVICE_PRODUCT_ID=0x8002       # Test PID
CONFIG_CHIP_DEVICE_HARDWARE_VERSION=1
CONFIG_CHIP_DEVICE_HARDWARE_VERSION_STRING="1.0"
CONFIG_CHIP_DEVICE_SOFTWARE_VERSION=1
CONFIG_CHIP_DEVICE_SOFTWARE_VERSION_STRING="1.0.0"
CONFIG_CHIP_DEVICE_TYPE=770                # 0x0302 = Temperature Sensor
CONFIG_CHIP_DEVICE_PRODUCT_NAME="nRF52840 Temp Sensor"
CONFIG_CHIP_DEVICE_VENDOR_NAME="Nordic Semiconductor"

# Commissioning
CONFIG_CHIP_DEVICE_DISCRIMINATOR=3841
CONFIG_CHIP_DEVICE_SPAKE2_PASSCODE=20202021

# OTA (disable for PoC simplicity)
CONFIG_CHIP_OTA_REQUESTOR=n

# Matter shell (useful for debugging)
CONFIG_CHIP_LIB_SHELL=y
CONFIG_SHELL=y
CONFIG_SHELL_STACK_SIZE=3584

# ---------------------------------------------------------------------------
# Thread networking (nRF52840 uses IEEE 802.15.4 radio for Thread)
# ---------------------------------------------------------------------------
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_OPENTHREAD_THREAD_VERSION_1_3=y
CONFIG_OPENTHREAD_MTD=y          # Minimal Thread Device (no routing)
CONFIG_OPENTHREAD_ENABLE_NCP=n

# Thread dataset (credentials injected at commissioning time by Apple Home / HomePod)
CONFIG_OPENTHREAD_MANUAL_START=n

# ---------------------------------------------------------------------------
# IEEE 802.15.4 radio (nRF52840 internal radio)
# ---------------------------------------------------------------------------
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_IEEE802154_NRF5=y

# ---------------------------------------------------------------------------
# Bluetooth Low Energy (used only during commissioning)
# ---------------------------------------------------------------------------
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF52840-Temp"
CONFIG_BT_DEVICE_NAME_MAX=32
CONFIG_BT_MAX_CONN=1
CONFIG_BT_LL_SOFTDEVICE=y

# ---------------------------------------------------------------------------
# NVS / Settings (persistent storage for Matter fabric credentials)
# ---------------------------------------------------------------------------
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_NVS_LOG_LEVEL=2

# ---------------------------------------------------------------------------
# Crypto (nRF cc310 hardware accelerator)
# ---------------------------------------------------------------------------
CONFIG_NORDIC_SECURITY_BACKEND=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y

# ---------------------------------------------------------------------------
# Temperature sensor (nRF52840 internal die temperature sensor)
# ---------------------------------------------------------------------------
CONFIG_SENSOR=y
CONFIG_TEMP_NRF5=y

# ---------------------------------------------------------------------------
# USB CDC ACM (console via USB on the dongle)
# ---------------------------------------------------------------------------
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_CONSOLE=n
CONFIG_USB_UART_CONSOLE=y
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_HANDLER=y
